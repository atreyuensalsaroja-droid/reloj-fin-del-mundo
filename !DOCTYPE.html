<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reloj del Fin del Mundo</title>

<style>

body{
font-family: Arial;
text-align:center;
background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
margin:0;
}

h1{
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:20px;
width:320px;
margin:auto;
margin-top:30px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.clock{
font-size:40px;
margin:10px;
}

.doomsday{
font-size:30px;
color:#ff4c4c;
margin:15px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#ff4c4c;
color:white;
}

button:hover{
background:#ff1a1a;
}

#mensaje{
margin-top:20px;
font-size:18px;
}

</style>
</head>

<body>

<h1>☢️ Reloj del Fin del Mundo</h1>

<div class="card">

<div>
Hora actual
</div>

<div id="hora" class="clock"></div>

<div>
Tiempo simbólico para la medianoche
</div>

<div class="doomsday">
90 segundos
</div>

<button onclick="mensaje()">Mensaje del futuro</button>
<button onclick="color()">Cambiar color</button>
<button onclick="broma()">Modo caos</button>

<div id="mensaje"></div>

</div>

<script>

function actualizarHora(){
let ahora = new Date();
document.getElementById("hora").innerHTML = ahora.toLocaleTimeString();
}

setInterval(actualizarHora,1000);

function mensaje(){

let mensajes=[
"La humanidad aún puede cambiar el futuro 🌍",
"Cuidado con la IA rebelde 🤖",
"Reduce contaminación hoy 🌱",
"La ciencia intenta salvarnos 🔬",
"Quizá todo esté bien… por ahora 👀"
];

let random=Math.floor(Math.random()*mensajes.length);

document.getElementById("mensaje").innerHTML=mensajes[random];

}

function color(){

let colores=["#0f0c29","#001f3f","#2c003e","#3a0f0f","#002b36"];

let random=Math.floor(Math.random()*colores.length);

document.body.style.background=colores[random];

}

function broma(){

document.getElementById("mensaje").innerHTML="⚠️ Simulación de caos activada ⚠️";

document.body.style.animation="shake 0.2s infinite";

}

</script>

</body>
</html>
